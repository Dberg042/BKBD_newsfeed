<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Techfeed Preview - Alle nyheter som kort">
    <title>Techfeed — Preview Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260518f">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            cursor: auto;
            user-select: text;
            -webkit-user-select: text;
            overflow-x: hidden;
            overflow-y: auto;
            background: #0A0E27;
            color: #F5F7FA;
            font-family: Inter, system-ui, sans-serif;
        }

        .preview-banner {
            position: sticky;
            top: 0;
            z-index: 60;
            min-height: 44px;
            background: #b91c1c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 12px;
            font-size: clamp(12px, 2vw, 15px);
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.03em;
        }

        .news-card {
            background: linear-gradient(135deg, #0F1629 0%, #1a2847 110%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        .news-image-wrap {
            height: clamp(180px, 36vw, 280px);
            background: linear-gradient(135deg, rgba(15, 22, 41, 0.95), rgba(26, 40, 71, 0.95));
        }

        .news-image {
            width: 110%;
            height: 110%;
            object-fit: cover;
            display: block;
        }

        .news-image-fallback {
            width: 110%;
            height: 110%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FF6B35;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, rgba(15, 22, 41, 0.92), rgba(26, 40, 71, 0.92));
        }

        .hidden {
            display: none !important;
        }

        .birthday-preview-card {
            background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 110%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(255, 117, 53, 0.3);
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 32px;
            color: #fff;
        }

        .birthday-preview-icon {
            font-size: 72px;
            flex-shrink: 0;
            line-height: 1;
        }

        .birthday-preview-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .birthday-preview-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            opacity: 0.8;
        }

        .birthday-preview-names {
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }

        .birthday-preview-message {
            font-size: 15px;
            font-weight: 400;
            opacity: 0.9;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-50">
    <div class="preview-banner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        PREVIEW MODE — Viser nyheter for <span id="preview-date-label">laster...</span>
    </div>

    <header class="bg-gradient-to-r from-slate-900 to-slate-950 border-b border-slate-800/30 px-4 py-4 md:px-6 md:py-5">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Techfeed Preview</h1>
            <p id="header-date" class="text-sm md:text-base font-semibold text-slate-300 whitespace-nowrap">Laster dato...</p>
        </div>
    </header>

    <main class="px-4 py-5 md:px-6 md:py-6">
        <section class="max-w-4xl mx-auto">
            <div id="cards-container" class="space-y-5"></div>

            <div id="empty-state" class="hidden rounded-2xl border border-slate-700 bg-slate-900/60 p-8 text-center text-slate-300">
                Ingen nyheter tilgjengelig for valgt dato.
            </div>

            <div id="error-state" class="hidden rounded-2xl border border-orange-600/50 bg-orange-500/11 p-8 text-center text-orange-200">
                Kunne ikke laste nyheter. Sjekk datafiler og prøv igjen.
            </div>

            <div class="pt-6 pb-11">
                <a
                    href="https://github.com/Dberg042/BKBD_newsfeed/edit/main/data/active.json"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="block w-full rounded-xl bg-orange-500 px-6 py-4 text-center text-base font-bold text-white transition-colors hover:bg-orange-600 md:text-lg"
                >
                    Godkjenn alle kort ✓
                </a>
            </div>
        </section>
    </main>

    <script>
        (function () {
            function getToday() {
                return new Date().toISOString().split('T')[0];
            }

            function formatDateLabel(dateStr) {
                var parts = dateStr.split('-');
                var months = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
                return parts[2] + '. ' + months[parseInt(parts[1], 11) - 1] + ' ' + parts[0];
            }

            function formatHeaderDate(dateStr) {
                var d = new Date(dateStr + 'T00:00:00');
                if (isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString('no-NO', {
                    weekday: 'long',
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
            }

            async function resolvePreviewDate() {
                var params = new URLSearchParams(window.location.search);
                if (params.has('date')) return params.get('date');

                try {
                    var res = await fetch('data/active.json?t=' + Date.now());
                    if (res.ok) {
                        var data = await res.json();
                        if (data.date_test) return data.date_test;
                    }
                } catch (e) {}

                return getToday();
            }

            function normalizeItem(item) {
                return {
                    title: item.title || item.headline || 'Uten tittel',
                    summary: item.summary || item.description || '',
                    source: item.source_name || item.source || item.publisher || 'Ukjent kilde',
                    image: item.local_image || item.image || item.image_url || '',
                    remoteImage: item.image_url || '',
                    priority: typeof item.priority === 'number' ? item.priority : 999
                };
            }

            async function fetchNewsItem(date, filename) {
                try {
                    var res = await fetch('data/' + date + '/' + filename + '?t=' + Date.now());
                    if (!res.ok) return null;
                    return await res.json();
                } catch (e) {
                    return null;
                }
            }

            function renderCard(item, index) {
                var article = document.createElement('article');
                article.className = 'news-card';

                var imageWrap = document.createElement('div');
                imageWrap.className = 'news-image-wrap';

                if (item.image) {
                    var img = document.createElement('img');
                    img.className = 'news-image';
                    img.loading = 'lazy';
                    img.alt = item.title;
                    img.src = item.image;
                    img.onerror = function () {
                        // If local optimized image failed and we have a remote URL, try it
                        if (this.src.indexOf('optimized-images/') !== -1 && item.remoteImage && item.remoteImage !== this.src) {
                            this.onerror = function () {
                                this.remove();
                                var fallback2 = document.createElement('div');
                                fallback2.className = 'news-image-fallback';
                                fallback2.textContent = 'Bilde utilgjengelig';
                                imageWrap.appendChild(fallback2);
                            };
                            this.src = item.remoteImage;
                            return;
                        }
                        img.remove();
                        var fallback = document.createElement('div');
                        fallback.className = 'news-image-fallback';
                        fallback.textContent = 'Bilde utilgjengelig';
                        imageWrap.appendChild(fallback);
                    };
                    imageWrap.appendChild(img);
                } else {
                    var noImg = document.createElement('div');
                    noImg.className = 'news-image-fallback';
                    noImg.textContent = 'Ingen bilde';
                    imageWrap.appendChild(noImg);
                }

                var body = document.createElement('div');
                body.className = 'news-card-body';
                body.innerHTML =
                    '<div class="news-card-label">Nyhet ' + (index + 1) + '</div>' +
                    '<h2 class="news-card-title">' + escapeHtml(item.title) + '</h2>' +
                    '<p class="news-card-summary">' + escapeHtml(item.summary) + '</p>' +
                    '<p class="news-card-source">' + escapeHtml(item.source) + '</p>';

                article.appendChild(imageWrap);
                article.appendChild(body);
                return article;
            }

            function renderBirthdayCard(item) {
                var article = document.createElement('article');
                article.className = 'birthday-preview-card';
                var names = (item.names || []).map(escapeHtml).join(', ');
                var message = escapeHtml(item.message || 'Gratulerer med dagen! 🎉');
                article.innerHTML =
                    '<div class="birthday-preview-icon">🎉</div>' +
                    '<div class="birthday-preview-body">' +
                        '<div class="birthday-preview-label">Bursdagshilsen</div>' +
                        '<div class="birthday-preview-names">' + names + '</div>' +
                        '<p class="birthday-preview-message">' + message + '</p>' +
                    '</div>';
                return article;
            }

            function escapeHtml(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            async function fetchNewsFileList(date) {
                // 1. manifest.json — generated by Hermes for each date folder
                try {
                    var res = await fetch('data/' + date + '/manifest.json?t=' + Date.now());
                    if (res.ok) {
                        var files = await res.json();
                        if (Array.isArray(files) && files.length) return files.slice(0, 11);
                    }
                } catch (e) {}

                // 2. Directory listing — works on Python http.server (local dev)
                try {
                    var res2 = await fetch('data/' + date + '/?t=' + Date.now());
                    if (res2.ok) {
                        var html = await res2.text();
                        var re = /href="(news-(\d+)\.json)"/g;
                        var matches = [];
                        var m;
                        while ((m = re.exec(html)) !== null) {
                            matches.push({ file: m[1], num: parseInt(m[2], 11) });
                        }
                        if (matches.length) {
                            matches.sort(function (a, b) { return b.num - a.num; });
                            return matches.map(function (x) { return x.file; }).slice(0, 11);
                        }
                    }
                } catch (e) {}

                // 3. Fallback: sequential pattern news-01..11
                var fallback = [];
                for (var i = 1; i <= 11; i++) {
                    fallback.push('news-' + String(i).padStart(2, '0') + '.json');
                }
                return fallback;
            }

            async function loadAndRender() {
                var label = document.getElementById('preview-date-label');
                var headerDate = document.getElementById('header-date');
                var cardsContainer = document.getElementById('cards-container');
                var emptyState = document.getElementById('empty-state');
                var errorState = document.getElementById('error-state');

                try {
                    var date = await resolvePreviewDate();
                    if (label) label.textContent = formatDateLabel(date);
                    if (headerDate) headerDate.textContent = formatHeaderDate(date);

                    var newsFiles = await fetchNewsFileList(date);

                    var results = await Promise.all(newsFiles.map(function (f) { return fetchNewsItem(date, f); }));
                    var items = results.filter(function (item) {
                        if (!item) return false;
                        if (item.type === 'birthday') return Array.isArray(item.names) && item.names.length > 0;
                        return !!(item.title || item.headline);
                    });

                    cardsContainer.innerHTML = '';

                    if (!items.length) {
                        emptyState.classList.remove('hidden');
                        return;
                    }

                    var newsIndex = 0;
                    items.forEach(function (item) {
                        if (item.type === 'birthday') {
                            cardsContainer.appendChild(renderBirthdayCard(item));
                        } else {
                            cardsContainer.appendChild(renderCard(normalizeItem(item), newsIndex));
                            newsIndex++;
                        }
                    });
                } catch (e) {
                    errorState.classList.remove('hidden');
                }
            }

            document.addEventListener('DOMContentLoaded', loadAndRender);
        })();
    </script>
</body>
</html>
