<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Infoskjerm News Carousel - TV Display">
    <title>Infoskjerm News Display</title>

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.tailwindcss.com/v4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-primary': '#0A0F1A',
                        'text-primary': '#F5F7FA',
                        'accent': '#FF6B35',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0A0F1A] text-[#F5F7FA] font-sans overflow-hidden">

    <!-- Header -->
    <header class="h-20 bg-[#0F1420] border-b border-[#1A2233] flex items-center justify-between px-10">
        <div class="text-sm font-semibold">
            <span id="header-date">Loading...</span>
        </div>
        <div class="text-2xl font-bold">Infoskjerm</div>
        <div class="text-sm font-semibold">
            <span id="header-time">--:--</span>
        </div>
    </header>

    <!-- Main Carousel Area -->
    <main class="flex-1 flex items-center justify-center px-10 py-8">
        <div id="carousel-container" class="w-full max-w-6xl">

            <!-- Carousel Content Card -->
            <div class="bg-[#141B2A] rounded-lg overflow-hidden shadow-2xl" style="aspect-ratio: 16/9;">
                <div class="flex h-full">

                    <!-- Left: Image Column -->
                    <div class="w-2/3 relative bg-[#0A0F1A] overflow-hidden">
                        <img id="carousel-image"
                             src=""
                             alt="News image"
                             class="w-full h-full object-cover"
                             style="opacity: 0; transition: opacity 0.6s ease-in-out;">

                        <!-- Image Fallback Text (for missing images) -->
                        <div id="image-fallback"
                             class="absolute inset-0 flex items-center justify-center text-center px-8 opacity-0 transition-opacity"
                             style="background: linear-gradient(135deg, #1A2233 0%, #0F1420 100%);">
                            <div>
                                <p id="fallback-source" class="text-4xl font-bold text-[#FF6B35]">--</p>
                                <p class="text-2xl text-[#A0A8B8] mt-4">Image unavailable</p>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Content Column -->
                    <div class="w-1/3 bg-[#0F1420] p-8 flex flex-col justify-between">

                        <!-- Headline -->
                        <div>
                            <h2 id="carousel-headline"
                                class="text-5xl font-bold leading-tight mb-6 line-clamp-3"
                                style="font-size: 3rem;">
                                Loading news...
                            </h2>

                            <!-- Summary -->
                            <p id="carousel-summary"
                               class="text-2xl leading-relaxed text-[#D0D8E0] line-clamp-6"
                               style="font-size: 1.5rem;">
                                Fetching content...
                            </p>
                        </div>

                        <!-- QR Code & Source -->
                        <div class="flex items-end justify-between gap-6">
                            <div>
                                <p id="carousel-source"
                                   class="text-lg font-semibold text-[#FF6B35] uppercase tracking-wide">
                                   Source
                                </p>
                            </div>
                            <div id="qr-code" class="w-32 h-32 bg-[#1A2233] rounded-lg flex items-center justify-center">
                                <span class="text-xs text-[#A0A8B8]">QR Code</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer: Progress Bar & Queue Preview -->
    <footer class="h-32 bg-[#0F1420] border-t border-[#1A2233] flex flex-col justify-between px-10 py-6">

        <!-- Progress Bar -->
        <div class="w-full">
            <div class="h-1 bg-[#1A2233] rounded-full overflow-hidden">
                <div id="progress-bar"
                     class="h-full bg-[#FF6B35] rounded-full"
                     style="width: 0%; animation: progress-fill 15s linear forwards;">
                </div>
            </div>
            <p class="text-xs text-[#A0A8B8] mt-2">
                <span id="current-item">1</span> / <span id="total-items">7</span>
            </p>
        </div>

        <!-- Queue Preview -->
        <div class="flex items-center gap-4 mt-4">
            <span class="text-sm font-semibold text-[#A0A8B8]">Neste:</span>
            <div id="queue-preview" class="flex gap-6 overflow-hidden">
                <div class="text-sm text-[#A0A8B8] truncate">→ Item 1</div>
                <div class="text-sm text-[#A0A8B8] truncate">→ Item 2</div>
                <div class="text-sm text-[#A0A8B8] truncate">→ Item 3</div>
            </div>
        </div>
    </footer>

    <!-- Fallback / Error State -->
    <div id="fallback-state"
         class="hidden fixed inset-0 bg-[#0A0F1A] flex flex-col items-center justify-center text-center px-10 z-50">
        <div class="max-w-2xl">
            <div class="text-6xl mb-6">⚠</div>
            <h2 class="text-4xl font-bold mb-4">No content available</h2>
            <p class="text-2xl text-[#A0A8B8] mb-8">
                Unable to load today's news. Please check the data files.
            </p>
            <p class="text-lg text-[#808A98]">
                Last known good content will display when available.
            </p>
        </div>
    </div>

    <!-- QR Code Styling Library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>

    <!-- Main Application Scripts -->
    <script src="js/app.js" defer></script>

</body>
</html>
