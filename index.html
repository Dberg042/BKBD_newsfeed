<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Infoskjerm News Carousel - TV Display">
    <title>Infoskjerm News Display</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'slate': {
                            '950': '#0A0E27',
                            '900': '#0F1629',
                            '800': '#1a2847',
                        },
                        'orange': {
                            '500': '#FF6B35',
                            '600': '#FF5722',
                        },
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css?v=20260515a">
</head>
<body class="min-h-screen flex flex-col bg-slate-950 text-slate-50 font-sans overflow-hidden">

    <!-- Header -->
    <header class="h-20 bg-gradient-to-r from-slate-900 to-slate-950 border-b border-slate-800/30 flex items-center justify-between px-12 backdrop-blur-sm">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">Techfeed</h1>
        </div>
        <div class="flex items-center gap-8">
            <p class="text-lg font-semibold tracking-wide text-slate-300">
                <span id="header-date">Loading...</span>
            </p>
            <p class="text-lg font-semibold tracking-wide text-slate-200">
                <span id="header-time">--:--</span>
            </p>
        </div>
    </header>

    <!-- Main Carousel -->
    <main class="flex-1 flex items-start justify-center px-6 py-4">
        <div id="carousel-container" class="w-full h-full">
            <!-- Carousel content injected by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="h-20 bg-gradient-to-t from-slate-900 to-slate-950 border-t border-slate-800/30 flex flex-col justify-between px-8 py-3">
        <!-- Progress Bar -->
        <div>
            <div class="h-1.5 bg-slate-800/40 rounded-full overflow-hidden backdrop-blur-sm">
                <div id="progress-bar"
                     class="h-full bg-gradient-to-r from-orange-500 to-orange-600 rounded-full shadow-lg shadow-orange-500/50"
                     style="width: 0%; animation: progress-fill 15s linear forwards;">
                </div>
            </div>
        </div>

        <!-- Queue Preview -->
        <div class="queue-row">
            <p class="text-xs font-medium text-slate-400 whitespace-nowrap">
                <span id="current-item">1</span> / <span id="total-items">7</span>
            </p>
            <div class="queue-label">Neste</div>
            <div id="queue-preview" class="queue-preview"></div>
        </div>
    </footer>

    <div id="no-news-message"
         class="hidden fixed inset-0 bg-slate-950 flex items-center justify-center z-50 backdrop-blur-sm"
         style="display: none;">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-900 mb-6">
                <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Ingen nyheter tilgjengelig</h2>
            <p class="text-slate-400">Karussellen lastes når nyheter er tilgjengelig</p>
        </div>
    </div>

    <div id="fallback-state"
         class="hidden fixed inset-0 bg-slate-950 flex items-center justify-center z-50 backdrop-blur-sm"
         style="display: none;">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-orange-500/10 mb-6">
                <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Kan ikke hente innhold</h2>
            <p class="text-slate-400">Viser sist kjente gode innhold når tilgjengelig</p>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>

    <!-- Application Scripts -->
    <script src="js/carousel.js?v=20260515a" defer></script>
    <script src="js/app.js?v=20260514h" defer></script>

</body>
</html>
